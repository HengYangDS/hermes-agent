name: Local Fork Validation

# This workflow belongs only to HengYangDS/hermes-agent.  It is intentionally
# outside the upstream PR workflow graph: publishing it to the fork supplies a
# zero-cost, repository-scoped check surface for exact PR commits, but it can
# neither approve nor satisfy NousResearch's fork-workflow admission policy.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Exact immutable commit SHA to validate
        required: true
        type: string
      suite:
        description: Affected contract suite to run
        required: true
        default: desktop
        type: choice
        options:
          - desktop
          - credentials

permissions:
  contents: read

jobs:
  validate:
    name: Local affected-source validation
    runs-on: [self-hosted, Linux, ARM64, hermes-fork-validation]
    timeout-minutes: 45
    steps:
      - name: Ref admission
        env:
          REF: ${{ inputs.ref }}
        run: |
          case "$REF" in
            [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]) ;;
            *) echo "ref must be a lowercase 40-character commit SHA" >&2; exit 64 ;;
          esac

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: inputs.suite == 'desktop'
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        if: inputs.suite == 'desktop'
        run: npm ci --ignore-scripts

      - name: Desktop affected-source contract
        if: inputs.suite == 'desktop'
        run: |
          npm run --prefix apps/desktop typecheck
          npm run --prefix apps/desktop test:desktop:platforms
          npm run --prefix apps/desktop test:ui
          npm run --prefix apps/desktop build

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        if: inputs.suite == 'credentials'

      - name: Credential-isolation affected-source contract
        if: inputs.suite == 'credentials'
        run: |
          uv python install 3.12
          uv sync --locked --python 3.12 --extra all --extra dev
          source .venv/bin/activate
          python -m pytest \
            tests/agent/test_credential_pool.py \
            tests/agent/test_secret_scope.py \
            tests/gateway/test_multiplex_credential_isolation.py \
            tests/gateway/test_api_server_multiplex_secret_scope.py \
            tests/gateway/test_64674_multiplex_primary_token_scope.py -v
          ruff check agent/credential_pool.py tests/agent/test_credential_pool.py
